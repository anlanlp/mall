<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>购物车</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'PingFang SC', sans-serif; }
        .nav { background: #2c3e50; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .nav a { color: white; text-decoration: none; margin-left: 30px; font-size: 16px; }
        .nav a:hover { color: #3498db; }
        .container { padding: 30px; max-width: 1000px; margin: 0 auto; }
        .cart-item { display: flex; align-items: center; border: 1px solid #eee; border-radius: 10px; padding: 20px; margin-bottom: 15px; }
        .cart-item img { width: 100px; height: 100px; object-fit: cover; margin-right: 25px; border-radius: 5px; }
        .cart-item .info { flex: 1; }
        .cart-item .info h3 { color: #333; margin-bottom: 10px; }
        .cart-item .info .price { color: #e74c3c; font-size: 20px; font-weight: bold; }
        .cart-item .num { color: #666; margin: 0 20px; font-size: 16px; }
        .cart-item .delete-btn { background: #e74c3c; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; }
        .cart-item .delete-btn:hover { background: #c0392b; }
        .total-section { margin-top: 30px; padding: 25px; background: #f8f9fa; border-radius: 10px; text-align: right; }
        .total-section .price-item { font-size: 18px; color: #666; margin: 8px 0; }
        .total-section .original-price { font-size: 18px; color: #999; }
        .total-section .discount-price { font-size: 18px; color: #ff3333; font-weight: bold; }
        .total-section .final-price { font-size: 28px; color: #e74c3c; font-weight: bold; margin: 15px 0 20px; }
        /* 按钮组样式 */
        .btn-group { display: flex; gap: 15px; justify-content: flex-end; align-items: center; }
        .total-section .pay-btn { background: #27ae60; color: white; border: none; padding: 15px 40px; border-radius: 5px; font-size: 18px; cursor: pointer; }
        .total-section .pay-btn:hover { background: #219a52; }
        .total-section .clear-btn { background: #999; color: white; border: none; padding: 15px 30px; border-radius: 5px; font-size: 18px; cursor: pointer; }
        .total-section .clear-btn:hover { background: #666; }
        .empty-cart { text-align: center; padding: 80px; color: #999; font-size: 18px; }

        /* 右下角悬浮购物车 */
        .float-cart {
            position: fixed; right: 30px; bottom: 30px;
            width: 100px; height: 100px;
            background: #ff3333; color: white;
            border-radius: 50%; display: flex;
            align-items: center; justify-content: center;
            font-size: 20px; font-weight: bold;
            cursor: pointer; box-shadow: 0 8px 20px rgba(255,51,51,0.5);
            z-index: 9999; border: 4px solid #fff;
        }
        .float-cart:hover { transform: scale(1.1); background: #e6000; }
    </style>
</head>
<body>
<div class="nav">
    <h2>拼淘狗商城</h2>
    <div>
        <a href="index.html">商城首页</a>
        <a href="user_info.html">个人中心</a>
    </div>
</div>

<div class="container">
    <h2>我的购物车</h2>
    <div id="cartList"></div>

    <!-- 总价和支付区域 + 新增清空按钮 -->
    <div class="total-section" id="totalSection" style="display:none;">
        <div class="price-item">商品原价：<span class="original-price" id="originalPrice">¥0.00</span></div>
        <div class="price-item">优惠减免：<span class="discount-price" id="discountPrice">-¥0.00</span></div>
        <div class="final-price">实付金额：<span id="finalPrice">¥0.00</span></div>
        <div class="btn-group">
            <button class="clear-btn" onclick="clearAllCart()">清空购物车</button>
            <button class="pay-btn" onclick="pay()">立即支付</button>
        </div>
    </div>
</div>

<div class="float-cart" onclick="window.location.href='cart.html'">购物车</div>

<script>
    const userId = 10001;
    let cartData = [];

    // 页面加载时获取购物车
    window.onload = function() {
        fetchCartList();
    };

    // 1. 获取购物车列表
    function fetchCartList() {
        fetch(`/cart/list/${userId}`)
            .then(res => res.json())
            .then(result => {
                console.log("购物车原始数据：", result);
                cartData = result || [];
                renderCart();
            })
            .catch(err => {
                console.error("请求错误：", err);
                cartData = [];
                renderCart();
            });
    }

    // 2. 渲染购物车
    function renderCart() {
        const listDiv = document.getElementById('cartList');
        const totalSection = document.getElementById('totalSection');

        if (cartData.length === 0) {
            listDiv.innerHTML = '<div class="empty-cart">购物车是空的，快去商城挑选商品吧~</div>';
            totalSection.style.display = 'none';
            return;
        }

        listDiv.innerHTML = cartData.map(cart => {
            const goodsName = cart.goods ? cart.goods.name : `商品ID: ${cart.goodsId}`;
            const goodsImg = cart.goods ? cart.goods.img : "/img/logo.png";
            const goodsPrice = cart.goods ? cart.goods.price : 0;
            const goodsDesc = cart.goods ? cart.goods.desc : "商品详情加载中...";

            return `
                <div class="cart-item">
                    <img src="${goodsImg}" alt="${goodsName}">
                    <div class="info">
                        <h3>${goodsName}</h3>
                        <p style="color:#666; font-size:14px; margin-bottom:8px;">${goodsDesc}</p>
                        <div class="price">¥${goodsPrice}</div>
                    </div>
                    <div class="num">x ${cart.num}</div>
                    <button class="delete-btn" onclick="deleteCart(${cart.id})">删除</button>
                </div>
            `;
        }).join('');

        calculateTotalAndDiscount();
        totalSection.style.display = 'block';
    }

    // 3. 计算总价 + 满减优惠
    function calculateTotalAndDiscount() {
        let originalTotal = 0;
        cartData.forEach(cart => {
            if (cart.goods) {
                originalTotal += cart.goods.price * cart.num;
            }
        });

        let discount = 0;
        if(originalTotal >= 1699) { discount = 400;}
        else if(originalTotal >= 1099) { discount = 200;}
        else if(originalTotal >= 699) { discount = 140;}
        else if(originalTotal >= 499) { discount = 100;}
        else if(originalTotal >= 299) { discount = 80;}
        else if (originalTotal >= 199) { discount = 50; }
        else if (originalTotal >= 129) { discount = 30; }
        else if (originalTotal >= 99) { discount = 20; }
        else { discount = 0; }

        let finalTotal = originalTotal - discount;

        document.getElementById('originalPrice').innerText = `¥${originalTotal.toFixed(2)}`;
        document.getElementById('discountPrice').innerText = `-¥${discount.toFixed(2)}`;
        document.getElementById('finalPrice').innerText = `¥${finalTotal.toFixed(2)}`;
    }

    // 4. 删除单个商品
    function deleteCart(cartId) {
        if (!confirm('确定要删除这件商品吗？')) return;

        fetch(`/cart/delete/${cartId}`, { method: 'DELETE' })
            .then(res => res.text())
            .then(result => {
                alert(result);
                fetchCartList();
            });
    }

    // 🔥 新增：一键清空所有购物车商品
    function clearAllCart() {
        if (cartData.length === 0) {
            alert("购物车已经是空的啦！");
            return;
        }
        if (!confirm('⚠️ 确定要清空购物车所有商品吗？此操作不可恢复！')) return;

        // 循环删除所有商品
        const deletePromises = cartData.map(cart =>
            fetch(`/cart/delete/${cart.id}`, { method: 'DELETE' })
        );

        // 全部删除完成后刷新页面
        Promise.all(deletePromises).then(() => {
            alert("✅ 购物车已清空！");
            fetchCartList();
        });
    }

    // 5. 支付
    function pay() {
        const finalTotal = document.getElementById('finalPrice').innerText.replace('¥','');

        if (!confirm(`确认支付 ${document.getElementById('finalPrice').innerText}？将直接从钱包余额扣除。`)) return;

        fetch(`/user/info/deductBalance?amount=${finalTotal}`, { method: 'POST' })
            .then(res => res.text())
            .then(result => {
                alert(result);
                if (result.includes('支付成功')) {
                    clearAllCart(); // 支付成功自动清空
                }
            });
    }
</script>
</body>
</html>
