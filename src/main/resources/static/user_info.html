<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>个人中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'PingFang SC', sans-serif; }
        .nav { background: #2c3e50; color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .nav a { color: white; text-decoration: none; margin-left: 30px; font-size: 16px; }
        .nav a:hover { color: #3498db; }
        .container { padding: 30px; max-width: 600px; margin: 50px auto; }
        .user-card { border: 1px solid #eee; border-radius: 15px; padding: 40px; text-align: center; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .user-card img { width: 120px; height: 120px; border-radius: 50%; margin-bottom: 20px; border: 4px solid #3498db; }
        .user-card h2 { color: #333; margin-bottom: 30px; }
        .info-item { display: flex; justify-content: space-between; padding: 15px 0; border-bottom: 1px solid #f5f5f5; font-size: 16px; }
        .info-item:last-child { border-bottom: none; }
        .info-item .label { color: #666; }
        .info-item .value { color: #333; font-weight: bold; }
        .balance { color: #e74c3c !important; font-size: 20px; }
        .coupon { color: #f39c12 !important; }
    </style>
</head>
<body>
<div class="nav">
    <h2>拼淘狗商城</h2>
    <div>
        <a href="index.html">商城首页</a>
        <a href="cart.html">购物车</a>
        <a href="user_info.html">个人中心</a>
        <a href="javascript:logout()" style="color:#ff4d4f; margin-left:30px;">退出登录</a>
    </div>
</div>

<div class="container">
    <div class="user-card" id="userCard">
        <!-- 个人信息将通过JS渲染在这里 -->
    </div>
</div>

<script>
    // 页面加载时获取个人信息
    window.onload = function() {
        fetchUserInfo();
    };

    // 获取个人信息
    function fetchUserInfo() {
        fetch('/user/info')
            .then(res => res.json())
            .then(user => {
                renderUserInfo(user);
            });
    }
    // 退出登录，返回登录页
    function logout() {
        if (confirm('确定要退出登录吗？')) {
            window.location.href = 'login.html';
        }
    }

    // 渲染个人信息
    function renderUserInfo(user) {
        const card = document.getElementById('userCard');
        card.innerHTML = `
                <img src="${user.avatarUrl}" alt="头像">
                <h2>${user.userName}</h2>
                <div class="info-item">
                    <span class="label">个人ID</span>
                    <span class="value">${user.userId}</span>
                </div>
                <div class="info-item">
                    <span class="label">收货地址</span>
                    <span class="value">${user.address}</span>
                </div>
                <div class="info-item">
                    <span class="label">优惠券</span>
                    <span class="value coupon">${user.couponNum} 张</span>
                </div>
                <div class="info-item">
                    <span class="label">钱包余额</span>
                    <span class="value balance">¥ ${user.walletBalance.toFixed(2)}</span>
                </div>
            `;
    }
</script>
</body>
</html>
